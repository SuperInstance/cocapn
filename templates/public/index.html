<!doctype html>
<html lang="en" data-domain="{{domain}}" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{username}} on {{domain}}" />
    <!-- Favicon injected by the active skin -->
    <link rel="icon" type="image/svg+xml" href="/skin/favicon.svg" />
    <title>{{username}} · {{domain}}</title>
    <!-- Skin CSS loaded first so React sees variables before first paint -->
    <link rel="stylesheet" href="/skin/theme.css" />
  </head>
  <body class="bg-surface text-text antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
