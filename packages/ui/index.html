<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="bridge-url" content="" />
    <title>Cocapn</title>
    <!--
      The DomainSkin component injects the skin <link> at runtime.
      A fallback stylesheet is included so the page isn't unstyled on first paint.
    -->
    <style id="cocapn-skin-fallback">
      :root {
        --color-primary:    #00ff88;
        --color-secondary:  #00cc6a;
        --color-accent:     #ff6b35;
        --color-bg:         #0a0a0a;
        --color-surface:    #111111;
        --color-surface-2:  #1a1a1a;
        --color-text:       #e8e8e8;
        --color-text-muted: #6b7280;
        --color-border:     #2a2a2a;
        --color-danger:     #ff4444;
        --color-success:    #00ff88;
        --font-sans: system-ui, sans-serif;
        --font-mono: "JetBrains Mono", "Fira Code", monospace;
        --radius: 0.375rem;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: var(--color-bg); color: var(--color-text); font-family: var(--font-sans); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
