name            = "cocapn-agent"
main            = "dist/worker.js"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

# Durable Objects — Admiral handles cross-device session persistence
[[durable_objects.bindings]]
name       = "ADMIRAL"
class_name = "AdmiralDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AdmiralDO"]

[vars]
PRIVATE_REPO  = ""
PUBLIC_REPO   = ""
BRIDGE_MODE   = "cloud"
